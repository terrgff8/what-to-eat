<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>要吃什麼？</title>
<style>
  /* ===== Hextech / LoL 風格 ===== */
  :root {
    --gold:      #C8AA6E;
    --gold-lt:   #F0E6D2;
    --gold-dim:  #785A28;
    --gold-deep: #463714;
    --teal:      #0AC8B9;
    --teal-dp:   #0397AB;
    --bg0:       #010A13;
    --bg1:       #0A1428;
    --panel:     #0A1F2C;
    --text:      #F0E6D2;
    --text-dim:  #A09B8C;
    --red:       #E84057;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(120% 90% at 50% 0%, #0A1E33 0%, var(--bg1) 42%, var(--bg0) 100%) fixed;
    color: var(--text);
    font-family: system-ui, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 44px;
    min-height: 100vh;
  }
  h1 {
    margin: 6px 0 2px;
    font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(180deg, #F0E6D2 0%, #C8AA6E 50%, #785A28 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--gold);
    filter: drop-shadow(0 0 10px rgba(200,170,110,.35));
  }
  .subtitle {
    margin: 0 0 18px;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: none;
  }
  /* 金色分隔線裝飾 */
  .subtitle::before, .subtitle::after {
    content: "◆";
    color: var(--gold-dim);
    margin: 0 8px;
    font-size: 10px;
    vertical-align: middle;
  }

  /* 轉盤區 */
  .wheel-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    margin-bottom: 20px;
    padding-top: 6px;
  }
  #pointer {
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-top: 22px solid var(--gold);
    z-index: 5;
    filter: drop-shadow(0 0 6px rgba(200,170,110,.9)) drop-shadow(0 2px 2px rgba(0,0,0,.6));
  }
  /* 指針頂端寶石 */
  #pointer::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 10px;
    height: 10px;
    background: radial-gradient(circle at 35% 35%, var(--teal) 0%, var(--teal-dp) 60%, #024 100%);
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 8px rgba(10,200,185,.8);
  }
  #wheel {
    display: block;
    transform-origin: center;
    border-radius: 50%;
    box-shadow:
      0 0 0 2px rgba(200,170,110,.35),
      0 0 34px rgba(10,200,185,.28),
      0 0 22px rgba(200,170,110,.22) inset,
      0 8px 44px rgba(0,0,0,.7);
  }

  /* 通用 hextech 按鈕 */
  .hex-btn {
    font-family: Georgia, "Times New Roman", serif;
    letter-spacing: 1px;
    color: var(--gold-lt);
    background: linear-gradient(180deg, #1E323C 0%, #0A1F2C 100%);
    border: 2px solid transparent;
    border-image: linear-gradient(180deg, #C8AA6E, #785A28) 1;
    cursor: pointer;
    transition: box-shadow .15s, filter .15s;
  }
  .hex-btn:hover:not(:disabled) {
    box-shadow: 0 0 16px rgba(200,170,110,.5);
    filter: brightness(1.15);
  }
  .hex-btn:disabled { opacity: .45; cursor: default; }

  #spinBtn {
    min-width: 220px;
    height: 56px;
    font-size: 21px;
    font-weight: 700;
    margin-bottom: 22px;
    color: #F5EFE0;
    background: linear-gradient(180deg, #C8AA6E 0%, #98793C 100%);
    border: 2px solid transparent;
    border-image: linear-gradient(180deg, #F0E6D2, #785A28) 1;
    text-shadow: 0 1px 2px rgba(0,0,0,.5);
    letter-spacing: 2px;
    font-family: Georgia, "Times New Roman", serif;
    cursor: pointer;
    transition: box-shadow .15s, filter .15s;
  }
  #spinBtn { color: #17110A; }
  #spinBtn:hover:not(:disabled) {
    box-shadow: 0 0 22px rgba(200,170,110,.65);
    filter: brightness(1.1);
  }
  #spinBtn:disabled { opacity: .5; cursor: default; }

  /* 編輯區 */
  #editPanel {
    width: 100%;
    max-width: 400px;
    background: linear-gradient(180deg, rgba(10,31,44,.92), rgba(1,10,19,.92));
    border: 1px solid var(--gold-dim);
    box-shadow: 0 0 18px rgba(0,0,0,.5), 0 0 0 1px rgba(200,170,110,.08) inset;
    padding: 4px 16px;
  }
  #editPanel summary {
    cursor: pointer;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--gold);
    padding: 12px 0;
    list-style: none;
    user-select: none;
  }
  #editPanel summary::-webkit-details-marker { display: none; }
  .item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-top: 1px solid rgba(120,90,40,.35);
  }
  .item-name { font-size: 16px; color: var(--text); word-break: break-all; padding-right: 8px; }
  .del-btn {
    min-width: 44px;
    min-height: 44px;
    font-size: 16px;
    color: var(--red);
    background: transparent;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .del-btn:hover:not(:disabled) { color: #FF6B7A; text-shadow: 0 0 8px rgba(232,64,87,.6); }
  .del-btn:disabled { color: #3A4750; cursor: default; }
  .add-row {
    display: flex;
    gap: 8px;
    padding: 12px 0 4px;
    border-top: 1px solid rgba(120,90,40,.35);
  }
  #newItemInput {
    flex: 1 1 auto;
    min-width: 0;
    height: 44px;
    font-size: 16px;
    padding: 0 12px;
    color: var(--text);
    background: rgba(1,10,19,.8);
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
  }
  #newItemInput::placeholder { color: #5C6B73; }
  #newItemInput:focus { outline: none; border-color: var(--teal-dp); box-shadow: 0 0 8px rgba(10,200,185,.4); }
  #addBtn {
    flex: 0 0 auto;
    height: 44px;
    padding: 0 18px;
    font-size: 16px;
    border-radius: 3px;
  }
  #resetBtn {
    margin: 12px 0 4px;
    height: 40px;
    padding: 0 16px;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    cursor: pointer;
    font-family: Georgia, "Times New Roman", serif;
  }
  #resetBtn:hover { color: var(--gold); border-color: var(--gold); }
  #msg { min-height: 20px; color: var(--red); font-size: 14px; padding: 4px 0; text-shadow: 0 0 6px rgba(232,64,87,.4); }

  /* 結果 modal */
  #resultModal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 50% 40%, rgba(3,20,30,.75), rgba(0,0,0,.88));
    z-index: 20;
    padding: 20px;
  }
  #resultModal.show { display: flex; }
  .modal-card {
    position: relative;
    width: min(85vw, 340px);
    background: linear-gradient(180deg, #0A2030 0%, #04101A 100%);
    border: 2px solid transparent;
    border-image: linear-gradient(180deg, #C8AA6E, #463714) 1;
    padding: 30px 24px;
    text-align: center;
    box-shadow: 0 0 40px rgba(10,200,185,.25), 0 0 0 1px rgba(200,170,110,.15) inset, 0 12px 48px rgba(0,0,0,.7);
  }
  .modal-small {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  #resultName {
    font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 24px;
    word-break: break-all;
    background: linear-gradient(180deg, #F0E6D2 0%, #C8AA6E 55%, #785A28 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: var(--gold);
    filter: drop-shadow(0 0 12px rgba(200,170,110,.4));
  }
  .modal-btns { display: flex; flex-direction: column; gap: 12px; }
  #mapsBtn {
    height: 52px;
    font-size: 17px;
    font-weight: 700;
    color: #17110A;
    background: linear-gradient(180deg, #C8AA6E 0%, #98793C 100%);
    border: 2px solid transparent;
    border-image: linear-gradient(180deg, #F0E6D2, #785A28) 1;
    cursor: pointer;
    font-family: Georgia, "Times New Roman", serif;
    letter-spacing: 1px;
    transition: box-shadow .15s, filter .15s;
  }
  #mapsBtn:hover { box-shadow: 0 0 20px rgba(200,170,110,.6); filter: brightness(1.1); }
  #againBtn {
    height: 48px;
    font-size: 15px;
    border-radius: 0;
  }
</style>
</head>
<body>
  <h1>要吃什麼？</h1>

  <div class="wheel-wrap">
    <div id="pointer"></div>
    <canvas id="wheel"></canvas>
  </div>

  <button id="spinBtn">🎲 轉！</button>

  <details id="editPanel">
    <summary id="editSummary">⚙️ 編輯選項</summary>
    <div id="itemList"></div>
    <div class="add-row">
      <input id="newItemInput" type="text" placeholder="新增選項，例如：拉麵" maxlength="20">
      <button id="addBtn" class="hex-btn">新增</button>
    </div>
    <button id="resetBtn">恢復預設</button>
    <div id="msg"></div>
  </details>

  <div id="resultModal">
    <div class="modal-card">
      <div class="modal-small">今天吃</div>
      <div id="resultName"></div>
      <div class="modal-btns">
        <button id="mapsBtn">🗺️ 找最近的</button>
        <button id="againBtn" class="hex-btn">🔄 再抽一次</button>
      </div>
    </div>
  </div>

<script>
  'use strict';
  var KEY = 'whatToEat.items.v2';
  var MAX = 40;
  var DEFAULTS = [
    '日式料理', '燒烤', '泰式', '火鍋', '便當',
    '拉麵', '壽司', '牛排', '義大利麵', '披薩',
    '韓式烤肉', '韓式炸雞', '越南河粉', '印度咖哩', '港式飲茶',
    '川菜', '粵菜', '台式熱炒', '滷味', '鹹酥雞',
    '水餃', '小籠包', '牛肉麵', '大腸麵線', '麻辣燙',
    '燒臘', '咖哩飯', '漢堡', '三明治', '早午餐',
    '沙拉', '涮涮鍋', '石鍋拌飯', '天婦羅', '丼飯',
    '烏龍麵', '鐵板燒', '港式茶餐廳', '越式法國麵包', '墨西哥捲餅'
  ];
  // Hextech 寶石色盤：藍綠 / 金銅 / 紫水晶 / 紅寶石 交錯（相鄰含首尾繞回皆異色）
  var PALETTE = ['#0AC8B9','#C8AA6E','#0397AB','#9D4EDD','#1E9E5A','#C0392B',
                 '#2471A3','#B8860B','#159895','#7B4FD8','#C8437B','#0A78C8',
                 '#1F8A70','#CA8A04','#5A4FCF','#0E7490','#A83279','#117A65',
                 '#3A6EA5','#B7791F'];

  var state = { items: loadItems(), rotation: 0, spinning: false };

  var canvas = document.getElementById('wheel');
  var ctx = canvas.getContext('2d');
  var spinBtn = document.getElementById('spinBtn');
  var resultModal = document.getElementById('resultModal');
  var resultName = document.getElementById('resultName');
  var mapsBtn = document.getElementById('mapsBtn');
  var againBtn = document.getElementById('againBtn');
  var itemList = document.getElementById('itemList');
  var editSummary = document.getElementById('editSummary');
  var newItemInput = document.getElementById('newItemInput');
  var addBtn = document.getElementById('addBtn');
  var resetBtn = document.getElementById('resetBtn');
  var msg = document.getElementById('msg');

  // ---- 讀取 / 儲存（§5.2）----
  function loadItems() {
    try {
      var arr = JSON.parse(localStorage.getItem(KEY));
      if (Array.isArray(arr)) {
        var clean = arr
          .filter(function (x) { return typeof x === 'string' && x.trim().length > 0; })
          .map(function (x) { return x.trim(); })
          .slice(0, MAX);
        if (clean.length >= 2) return clean;
      }
    } catch (e) { /* 壞資料 → 落到預設 */ }
    return DEFAULTS.slice();
  }
  function saveItems() {
    try { localStorage.setItem(KEY, JSON.stringify(state.items)); } catch (e) {}
  }

  // ---- 尺寸（§4.1.2 唯一公式）----
  function calcSize() { return Math.min(Math.round(window.innerWidth * 0.9), 400); }

  // ---- 轉盤繪製（§5.3）----
  function truncate(name) {
    var cp = Array.from(name);
    return cp.length > 8 ? cp.slice(0, 7).join('') + '…' : name;
  }
  // 色階：p<0 變暗、p>0 變亮
  function shade(hex, p) {
    var num = parseInt(hex.slice(1), 16);
    var r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
    var t = p < 0 ? 0 : 255, a = Math.abs(p);
    return 'rgb(' + (Math.round((t - r) * a) + r) + ',' +
                    (Math.round((t - g) * a) + g) + ',' +
                    (Math.round((t - b) * a) + b) + ')';
  }
  function drawWheel() {
    var size = calcSize();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var n = state.items.length;
    var seg = 360 / n;
    var cx = size / 2, cy = size / 2, r = size / 2;
    var fs = n <= 6 ? 16 : (n <= 8 ? 15 : (n <= 12 ? 13 : (n <= 20 ? 12 : 11)));
    var rim = r * 0.965;                 // 扇形外緣（留金環空間）

    ctx.clearRect(0, 0, size, size);

    // 底盤暗環
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.fillStyle = '#02080E';
    ctx.fill();

    for (var i = 0; i < n; i++) {
      var start = (-90 + i * seg) * Math.PI / 180;
      var end = (-90 + (i + 1) * seg) * Math.PI / 180;
      var baseColor = PALETTE[i % PALETTE.length];

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rim, start, end);
      ctx.closePath();
      // 寶石徑向漸層：中心深、外緣亮
      var grad = ctx.createRadialGradient(cx, cy, rim * 0.08, cx, cy, rim);
      grad.addColorStop(0, shade(baseColor, -0.45));
      grad.addColorStop(0.55, shade(baseColor, -0.12));
      grad.addColorStop(1, shade(baseColor, 0.12));
      ctx.fillStyle = grad;
      ctx.fill();
      // 金色分隔線
      ctx.strokeStyle = 'rgba(200,170,110,.55)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // 文字（金白 + 暗影）
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((-90 + i * seg + seg / 2) * Math.PI / 180);
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,.85)';
      ctx.shadowBlur = 3;
      ctx.fillStyle = '#F5EFE0';
      ctx.font = 'bold ' + fs + 'px system-ui, sans-serif';
      ctx.fillText(truncate(state.items[i]), rim * 0.9, 0);
      ctx.restore();
    }

    // 外圈雕紋金環
    ctx.shadowBlur = 0;
    var ringGrad = ctx.createLinearGradient(0, 0, size, size);
    ringGrad.addColorStop(0, '#F0E6D2');
    ringGrad.addColorStop(0.5, '#C8AA6E');
    ringGrad.addColorStop(1, '#785A28');
    ctx.beginPath();
    ctx.arc(cx, cy, rim + (r - rim) * 0.5, 0, 2 * Math.PI);
    ctx.strokeStyle = ringGrad;
    ctx.lineWidth = (r - rim);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, rim, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(70,55,20,.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 中心 hextech 寶石
    var hubR = r * 0.13;
    ctx.beginPath();
    ctx.arc(cx, cy, hubR + 4, 0, 2 * Math.PI);
    ctx.fillStyle = '#785A28';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, hubR + 2.5, 0, 2 * Math.PI);
    ctx.strokeStyle = '#F0E6D2';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    var gemGrad = ctx.createRadialGradient(cx - hubR * 0.3, cy - hubR * 0.3, hubR * 0.1, cx, cy, hubR);
    gemGrad.addColorStop(0, '#7FFFF2');
    gemGrad.addColorStop(0.5, '#0AC8B9');
    gemGrad.addColorStop(1, '#024C52');
    ctx.beginPath();
    ctx.arc(cx, cy, hubR, 0, 2 * Math.PI);
    ctx.fillStyle = gemGrad;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx - hubR * 0.32, cy - hubR * 0.32, hubR * 0.22, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.fill();
  }

  // ---- 轉動與中獎（§5.4 照抄）----
  function spin() {
    if (state.spinning || state.items.length < 2) return;
    state.spinning = true;
    spinBtn.disabled = true;

    var n = state.items.length;
    var seg = 360 / n;
    var winnerIndex = Math.floor(Math.random() * n);
    var centerOffset = winnerIndex * seg + seg / 2;
    var jitter = (Math.random() - 0.5) * seg * 0.7;
    var current = state.rotation;
    var delta = ((360 - centerOffset) - (current % 360) + 720) % 360;
    var target = current + 5 * 360 + delta + jitter;

    animate(current, target, 4000, function () {
      state.rotation = target;
      state.spinning = false;
      spinBtn.disabled = false;
      showResult(state.items[winnerIndex], winnerIndex);
      if (pendingResize) { pendingResize = false; drawWheel(); }
    });
  }
  function animate(from, to, dur, done) {
    var t0 = performance.now();
    (function frame(now) {
      var t = Math.min((now - t0) / dur, 1);
      var p = 1 - Math.pow(1 - t, 3);
      canvas.style.transform = 'rotate(' + (from + (to - from) * p) + 'deg)';
      if (t < 1) requestAnimationFrame(frame); else done();
    })(performance.now());
  }

  // ---- 結果 modal（§5.5）----
  function showResult(item, winnerIndex) {
    resultName.textContent = item;
    resultName.dataset.idx = winnerIndex;
    mapsBtn.textContent = '🗺️ 找最近的' + item;
    resultModal.classList.add('show');
  }
  function closeModal() { resultModal.classList.remove('show'); }

  mapsBtn.addEventListener('click', function () {
    var item = resultName.textContent;
    window.open(
      'https://www.google.com/maps/search/?api=1&query=' +
        encodeURIComponent('附近的' + item),
      '_blank', 'noopener');
  });
  againBtn.addEventListener('click', function () { closeModal(); spin(); });
  resultModal.addEventListener('click', function (e) {
    if (e.target === resultModal) closeModal();
  });

  // ---- 選項管理（§5.6）----
  var msgTimer;
  function showMsg(t) {
    msg.textContent = t;
    clearTimeout(msgTimer);
    msgTimer = setTimeout(function () { msg.textContent = ''; }, 3000);
  }
  function commit() {
    saveItems();
    drawWheel();
    renderList();
  }
  function renderList() {
    itemList.textContent = '';
    var canDelete = state.items.length > 2;
    state.items.forEach(function (name, i) {
      var row = document.createElement('div');
      row.className = 'item-row';
      var label = document.createElement('span');
      label.className = 'item-name';
      label.textContent = name;
      var del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.setAttribute('aria-label', '刪除 ' + name);
      del.disabled = !canDelete;
      del.addEventListener('click', function () { removeItem(i); });
      row.appendChild(label);
      row.appendChild(del);
      itemList.appendChild(row);
    });
    editSummary.textContent = '⚙️ 編輯選項（' + state.items.length + ' 個）';
  }
  function addItem() {
    if (state.spinning) return;
    var raw = newItemInput.value.trim();
    if (!raw) { showMsg('請輸入名稱'); return; }
    if (state.items.indexOf(raw) !== -1) { showMsg('「' + raw + '」已存在'); return; }
    if (Array.from(raw).length > 12) { showMsg('名稱最長 12 字'); return; }
    if (state.items.length >= MAX) { showMsg('最多 ' + MAX + ' 個選項'); return; }
    state.items.push(raw);
    newItemInput.value = '';
    commit();
  }
  function removeItem(i) {
    if (state.spinning) return;
    if (state.items.length <= 2) return;
    state.items.splice(i, 1);
    commit();
  }
  function resetItems() {
    if (state.spinning) return;
    state.items = DEFAULTS.slice();
    commit();
  }

  spinBtn.addEventListener('click', spin);
  addBtn.addEventListener('click', addItem);
  resetBtn.addEventListener('click', resetItems);
  newItemInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); addItem(); }
  });

  // ---- resize（§6.5）----
  var resizeTimer, pendingResize = false;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      if (state.spinning) { pendingResize = true; return; }
      drawWheel();
    }, 200);
  });

  // ---- init ----
  drawWheel();
  renderList();
</script>
</body>
</html>
