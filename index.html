<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>要吃什麼？</title>
<style>
  /* ===== Ludens / High-Tech EVA 風格（Kojima Productions · 新川洋司） =====
     65-25-10-2 配色法：鈦金白 / 碳纖黑 / 工業金 / 氧氣藍 + 鋼鐵灰結構色 */
  :root {
    --white:  #F2F2F2;   /* Titanium White  外部主裝甲 65% */
    --white-hi:#FFFFFF;
    --black:  #1A1A1B;   /* Carbon Black    關節內襯 25% */
    --black-2:#0E0E0F;
    --gold:   #C5A059;   /* Industrial Gold 面罩邊框 10% */
    --gold-hi:#E8D39A;
    --gold-dp:#8A6E38;
    --blue:   #00E5FF;   /* Oxygen Blue     生命維持藍光 2% */
    --grey:   #4A4A4A;   /* Steel Grey      機械結構 */
    --grey-lt:#8A8A8E;
    --paper:  #ECECEE;
    --ink:    #1A1A1B;
    --dim:    #6E6E72;
    --alert:  #B23A2E;   /* 功能色：驗證錯誤提示（面積極小） */
    --font: "Futura", "Century Gothic", "Twentieth Century", system-ui, "Segoe UI", "Noto Sans TC", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(120% 90% at 50% 0%, #FFFFFF 0%, var(--paper) 46%, #DCDCDF 100%) fixed;
    color: var(--ink);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 12px 44px;
    min-height: 100vh;
  }
  h1 {
    margin: 4px 0 22px;
    font-family: var(--font);
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 6px;
    color: var(--black);
    text-transform: uppercase;
  }

  #soundBtn {
    position: fixed;
    top: 14px;
    right: 14px;
    width: 42px;
    height: 42px;
    font-size: 17px;
    line-height: 1;
    color: var(--black);
    background: var(--white-hi);
    border: 1.5px solid var(--black);
    border-radius: 50%;
    cursor: pointer;
    z-index: 30;
    box-shadow: 0 2px 8px rgba(26,26,27,.14), 0 0 0 3px rgba(197,160,89,.28);
    transition: box-shadow .15s, transform .15s;
  }
  #soundBtn:hover { box-shadow: 0 0 0 3px var(--gold), 0 0 14px rgba(0,229,255,.35); transform: translateY(-1px); }

  /* 轉盤區 */
  .wheel-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    margin-bottom: 22px;
    padding: 14px;
  }
  /* 工程製圖角括號（四角 L 形） */
  .wheel-wrap::before, .wheel-wrap::after {
    content: "";
    position: absolute;
    width: 26px; height: 26px;
    border: 2px solid var(--gold);
    pointer-events: none;
  }
  .wheel-wrap::before { top: 0; left: 0; border-right: none; border-bottom: none; }
  .wheel-wrap::after  { bottom: 0; right: 0; border-left: none; border-top: none; }
  #pointer {
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-top: 24px solid var(--gold);
    z-index: 5;
    filter: drop-shadow(0 0 2px rgba(26,26,27,.9)) drop-shadow(0 2px 3px rgba(0,0,0,.5));
  }
  /* 指針頂端氧氣藍 LED（藍光錨點） */
  #pointer::before {
    content: "";
    position: absolute;
    top: -13px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 10px;
    height: 10px;
    background: radial-gradient(circle at 35% 35%, #EAFFFF 0%, var(--blue) 55%, #0088A0 100%);
    border: 1.5px solid var(--black);
    box-shadow: 0 0 10px rgba(0,229,255,.9);
  }
  #wheel {
    display: block;
    transform-origin: center;
    border-radius: 50%;
    box-shadow:
      0 0 0 2px rgba(26,26,27,.6),
      0 0 0 6px rgba(197,160,89,.25),
      0 10px 40px rgba(26,26,27,.35);
  }

  /* 通用 Ludens 按鈕（碳黑塊 + 金邊 + 全大寫） */
  .hex-btn {
    font-family: var(--font);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--white);
    background: linear-gradient(180deg, #2A2A2C 0%, var(--black) 100%);
    border: 1.5px solid var(--gold);
    border-radius: 2px;
    cursor: pointer;
    transition: box-shadow .15s, filter .15s, border-color .15s;
  }
  .hex-btn:hover:not(:disabled) {
    box-shadow: 0 0 0 1px var(--gold), 0 0 14px rgba(0,229,255,.35);
    filter: brightness(1.12);
  }
  .hex-btn:disabled { opacity: .4; cursor: default; }

  #spinBtn {
    position: relative;
    min-width: 230px;
    height: 58px;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 24px;
    color: var(--white-hi);
    background: linear-gradient(180deg, #2A2A2C 0%, var(--black-2) 100%);
    border: 2px solid var(--gold);
    border-radius: 2px;
    font-family: var(--font);
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(26,26,27,.3), 0 0 0 4px rgba(197,160,89,.14);
    transition: box-shadow .15s, filter .15s;
  }
  #spinBtn::after {   /* 氧氣藍 LED 狀態燈 */
    content: "";
    position: absolute;
    top: 8px; right: 10px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 8px var(--blue);
  }
  #spinBtn:hover:not(:disabled) {
    box-shadow: 0 0 0 1px var(--gold-hi), 0 0 22px rgba(0,229,255,.45);
    filter: brightness(1.1);
  }
  #spinBtn:disabled { opacity: .5; cursor: default; }

  /* 編輯區 */
  #editPanel {
    width: 100%;
    max-width: 400px;
    background: var(--white-hi);
    border: 1.5px solid var(--black);
    border-top: 3px solid var(--gold);
    box-shadow: 0 6px 22px rgba(26,26,27,.12);
    padding: 4px 16px;
  }
  #editPanel summary {
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--black);
    padding: 13px 0;
    list-style: none;
    user-select: none;
  }
  #editPanel summary::-webkit-details-marker { display: none; }
  .item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-top: 1px solid rgba(74,74,74,.22);
  }
  .item-name { font-size: 16px; color: var(--ink); word-break: break-all; padding-right: 8px; }
  .del-btn {
    min-width: 44px;
    min-height: 44px;
    font-size: 16px;
    color: var(--grey);
    background: transparent;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .del-btn:hover:not(:disabled) { color: var(--gold-dp); text-shadow: 0 0 8px rgba(197,160,89,.5); }
  .del-btn:disabled { color: #C3C3C6; cursor: default; }
  .add-row {
    display: flex;
    gap: 8px;
    padding: 12px 0 4px;
    border-top: 1px solid rgba(74,74,74,.22);
  }
  #newItemInput {
    flex: 1 1 auto;
    min-width: 0;
    height: 44px;
    font-size: 16px;
    padding: 0 12px;
    color: var(--ink);
    background: var(--white);
    border: 1.5px solid var(--grey);
    border-radius: 2px;
  }
  #newItemInput::placeholder { color: var(--grey-lt); }
  #newItemInput:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 8px rgba(0,229,255,.4); }
  #addBtn {
    flex: 0 0 auto;
    height: 44px;
    padding: 0 18px;
    font-size: 15px;
    border-radius: 2px;
  }
  #resetBtn {
    margin: 12px 0 4px;
    height: 40px;
    padding: 0 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    background: transparent;
    border: 1px solid var(--grey);
    border-radius: 2px;
    cursor: pointer;
    font-family: var(--font);
  }
  #resetBtn:hover { color: var(--black); border-color: var(--gold); }
  #msg { min-height: 20px; color: var(--alert); font-size: 14px; font-weight: 600; padding: 4px 0; }

  /* 結果 modal */
  #resultModal {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 50% 40%, rgba(26,26,27,.72), rgba(0,0,0,.9));
    z-index: 20;
    padding: 20px;
  }
  #resultModal.show { display: flex; }
  .modal-card {
    position: relative;
    width: min(85vw, 340px);
    background: linear-gradient(180deg, var(--white-hi) 0%, var(--white) 100%);
    border: 2px solid var(--gold);
    border-radius: 2px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(26,26,27,.5), 0 22px 60px rgba(0,0,0,.55), 0 0 40px rgba(0,229,255,.12);
  }
  .modal-small {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold-dp);
    margin-bottom: 10px;
  }
  #resultName {
    font-family: var(--font);
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 26px;
    word-break: break-all;
    color: var(--black);
  }
  .modal-btns { display: flex; flex-direction: column; gap: 12px; }
  #mapsBtn {
    height: 52px;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-hi);
    background: linear-gradient(180deg, #2A2A2C 0%, var(--black-2) 100%);
    border: 2px solid var(--gold);
    border-radius: 2px;
    cursor: pointer;
    font-family: var(--font);
    transition: box-shadow .15s, filter .15s;
  }
  #mapsBtn:hover { box-shadow: 0 0 0 1px var(--gold-hi), 0 0 20px rgba(0,229,255,.4); filter: brightness(1.1); }
  #againBtn {
    height: 48px;
    font-size: 14px;
    border-radius: 2px;
  }
</style>
</head>
<body>
  <button id="soundBtn" aria-label="音效開關">🔊</button>
  <h1>要吃什麼？</h1>

  <div class="wheel-wrap">
    <div id="pointer"></div>
    <canvas id="wheel"></canvas>
  </div>

  <button id="spinBtn">🎲 轉！</button>

  <details id="editPanel">
    <summary id="editSummary">⚙️ 編輯選項</summary>
    <div id="itemList"></div>
    <div class="add-row">
      <input id="newItemInput" type="text" placeholder="新增選項，例如：拉麵" maxlength="20">
      <button id="addBtn" class="hex-btn">新增</button>
    </div>
    <button id="resetBtn">恢復預設</button>
    <div id="msg"></div>
  </details>

  <div id="resultModal">
    <div class="modal-card">
      <div class="modal-small">今天吃</div>
      <div id="resultName"></div>
      <div class="modal-btns">
        <button id="mapsBtn">🗺️ 找最近的</button>
        <button id="againBtn" class="hex-btn">🔄 再抽一次</button>
      </div>
    </div>
  </div>

<script>
  'use strict';
  var KEY = 'whatToEat.items.v2';
  var MAX = 40;
  var DEFAULTS = [
    '日式料理', '燒烤', '泰式', '火鍋', '便當',
    '拉麵', '壽司', '牛排', '義大利麵', '披薩',
    '韓式烤肉', '韓式炸雞', '越南河粉', '印度咖哩', '港式飲茶',
    '川菜', '粵菜', '台式熱炒', '滷味', '鹹酥雞',
    '水餃', '小籠包', '牛肉麵', '大腸麵線', '麻辣燙',
    '燒臘', '咖哩飯', '漢堡', '三明治', '早午餐',
    '沙拉', '涮涮鍋', '石鍋拌飯', '天婦羅', '丼飯',
    '烏龍麵', '鐵板燒', '港式茶餐廳', '越式法國麵包', '墨西哥捲餅'
  ];

  var state = { items: loadItems(), rotation: 0, spinning: false };

  var canvas = document.getElementById('wheel');
  var ctx = canvas.getContext('2d');
  var spinBtn = document.getElementById('spinBtn');
  var resultModal = document.getElementById('resultModal');
  var resultName = document.getElementById('resultName');
  var mapsBtn = document.getElementById('mapsBtn');
  var againBtn = document.getElementById('againBtn');
  var itemList = document.getElementById('itemList');
  var editSummary = document.getElementById('editSummary');
  var newItemInput = document.getElementById('newItemInput');
  var addBtn = document.getElementById('addBtn');
  var resetBtn = document.getElementById('resetBtn');
  var msg = document.getElementById('msg');
  var soundBtn = document.getElementById('soundBtn');

  // ---- 金屬音效（Web Audio 合成，零外部音檔）----
  var SKEY = 'whatToEat.sound.v1';
  var audioCtx = null;
  var soundOn = loadSound();
  function loadSound() {
    try { return localStorage.getItem(SKEY) !== '0'; } catch (e) { return true; }
  }
  function ensureAudio() {
    if (!soundOn) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) { audioCtx = null; }
  }
  // 齒輪棘輪金屬 tick
  function playTick() {
    if (!soundOn || !audioCtx) return;
    var t = audioCtx.currentTime;
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 2600; bp.Q.value = 8;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.22, t + 0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.055);
    bp.connect(g); g.connect(audioCtx.destination);
    [2150, 3400].forEach(function (f, i) {              // 非諧波雙分音＝金屬感
      var o = audioCtx.createOscillator();
      o.type = 'square';
      o.frequency.setValueAtTime(f, t);
      o.frequency.exponentialRampToValueAtTime(f * 0.7, t + 0.05);
      var og = audioCtx.createGain(); og.gain.value = i ? 0.4 : 0.8;
      o.connect(og); og.connect(bp);
      o.start(t); o.stop(t + 0.07);
    });
  }
  // 落定金屬鐘鳴（非諧波鐘聲）
  function playChime() {
    if (!soundOn || !audioCtx) return;
    var t = audioCtx.currentTime;
    var master = audioCtx.createGain();
    master.gain.setValueAtTime(0.0001, t);
    master.gain.exponentialRampToValueAtTime(0.5, t + 0.012);
    master.gain.exponentialRampToValueAtTime(0.0001, t + 1.5);
    master.connect(audioCtx.destination);
    var base = 523.25;                                  // C5
    [1, 2.01, 2.76, 3.93, 5.4].forEach(function (r, i) {
      var o = audioCtx.createOscillator();
      o.type = i < 2 ? 'triangle' : 'sine';
      o.frequency.value = base * r;
      var og = audioCtx.createGain(); og.gain.value = 0.55 / (i + 1);
      o.connect(og); og.connect(master);
      o.start(t); o.stop(t + 1.5);
    });
  }

  // ---- 讀取 / 儲存（§5.2）----
  function loadItems() {
    try {
      var arr = JSON.parse(localStorage.getItem(KEY));
      if (Array.isArray(arr)) {
        var clean = arr
          .filter(function (x) { return typeof x === 'string' && x.trim().length > 0; })
          .map(function (x) { return x.trim(); })
          .slice(0, MAX);
        if (clean.length >= 2) return clean;
      }
    } catch (e) { /* 壞資料 → 落到預設 */ }
    return DEFAULTS.slice();
  }
  function saveItems() {
    try { localStorage.setItem(KEY, JSON.stringify(state.items)); } catch (e) {}
  }

  // ---- 尺寸（§4.1.2 唯一公式）----
  function calcSize() { return Math.min(Math.round(window.innerWidth * 0.9), 400); }

  // ---- 轉盤繪製（§5.3）----
  function truncate(name) {
    var cp = Array.from(name);
    return cp.length > 8 ? cp.slice(0, 7).join('') + '…' : name;
  }
  // Ludens 裝甲板：白/碳交錯扇形 + 金色接縫 + 工程螺絲 + 頭盔圓頂 + 氧氣藍 LED
  function drawWheel() {
    var size = calcSize();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var n = state.items.length;
    var seg = 360 / n;
    var cx = size / 2, cy = size / 2, r = size / 2;
    var fs = n <= 6 ? 16 : (n <= 8 ? 15 : (n <= 12 ? 13 : (n <= 20 ? 12 : 11)));
    var rim = r * 0.955;                 // 裝甲板外緣（留金環空間）

    ctx.clearRect(0, 0, size, size);

    // 底盤碳黑
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.fillStyle = '#0E0E0F';
    ctx.fill();

    for (var i = 0; i < n; i++) {
      var start = (-90 + i * seg) * Math.PI / 180;
      var end = (-90 + (i + 1) * seg) * Math.PI / 180;
      var isWhite = (i % 2 === 0);       // 材質碰撞：鈦金白裝甲 vs 碳纖黑內襯

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rim, start, end);
      ctx.closePath();
      // 磨砂金屬徑向漸層：中心亮、外緣沉
      var grad = ctx.createRadialGradient(cx, cy, rim * 0.12, cx, cy, rim);
      if (isWhite) {
        grad.addColorStop(0, '#FFFFFF');
        grad.addColorStop(0.68, '#F2F2F2');
        grad.addColorStop(1, '#D6D6DA');
      } else {
        grad.addColorStop(0, '#26262A');
        grad.addColorStop(0.68, '#1A1A1B');
        grad.addColorStop(1, '#101011');
      }
      ctx.fillStyle = grad;
      ctx.fill();
      // 工業金接縫
      ctx.strokeStyle = 'rgba(197,160,89,.85)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // 文字（依板材反色，功能主義）
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((-90 + i * seg + seg / 2) * Math.PI / 180);
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = isWhite ? 'rgba(255,255,255,.5)' : 'rgba(0,0,0,.6)';
      ctx.shadowBlur = 2;
      ctx.fillStyle = isWhite ? '#1A1A1B' : '#F2F2F2';
      ctx.font = '700 ' + fs + 'px "Futura","Century Gothic",system-ui,sans-serif';
      ctx.fillText(truncate(state.items[i]), rim * 0.9, 0);
      ctx.restore();
    }
    ctx.shadowBlur = 0;

    // 工業金外框環（面罩邊框）
    var bandInner = rim;
    var bandOuter = r * 0.995;
    var bandMid = (bandInner + bandOuter) / 2;
    var ringGrad = ctx.createLinearGradient(0, 0, size, size);
    ringGrad.addColorStop(0, '#E8D39A');
    ringGrad.addColorStop(0.5, '#C5A059');
    ringGrad.addColorStop(1, '#8A6E38');
    ctx.beginPath();
    ctx.arc(cx, cy, bandMid, 0, 2 * Math.PI);
    ctx.strokeStyle = ringGrad;
    ctx.lineWidth = (bandOuter - bandInner);
    ctx.stroke();
    // 環兩側碳黑細邊
    ctx.beginPath();
    ctx.arc(cx, cy, bandInner, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(26,26,27,.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, bandOuter, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(26,26,27,.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 工程螺絲：各接縫落在金環上（選項不多時才畫，避免雜亂）
    if (n <= 24) {
      var screwR = Math.max(2, r * 0.013);
      for (var s = 0; s < n; s++) {
        var a = (-90 + s * seg) * Math.PI / 180;
        var sx = cx + Math.cos(a) * bandMid;
        var sy = cy + Math.sin(a) * bandMid;
        ctx.beginPath();
        ctx.arc(sx, sy, screwR, 0, 2 * Math.PI);
        ctx.fillStyle = '#F2F2F2';
        ctx.fill();
        ctx.strokeStyle = '#1A1A1B';
        ctx.lineWidth = 1;
        ctx.stroke();
        // 一字螺絲槽
        ctx.beginPath();
        ctx.moveTo(sx - screwR * 0.6, sy);
        ctx.lineTo(sx + screwR * 0.6, sy);
        ctx.strokeStyle = '#4A4A4A';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // 中心頭盔圓頂 + 氧氣藍 LED（藍光錨點 2%）
    var hubR = r * 0.13;
    // 金色斜面
    ctx.beginPath();
    ctx.arc(cx, cy, hubR + 5, 0, 2 * Math.PI);
    ctx.fillStyle = '#C5A059';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, hubR + 5, 0, 2 * Math.PI);
    ctx.strokeStyle = '#1A1A1B';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 鈦金白圓頂
    var domeGrad = ctx.createRadialGradient(cx - hubR * 0.35, cy - hubR * 0.35, hubR * 0.1, cx, cy, hubR);
    domeGrad.addColorStop(0, '#FFFFFF');
    domeGrad.addColorStop(0.6, '#E4E4E7');
    domeGrad.addColorStop(1, '#B4B4B9');
    ctx.beginPath();
    ctx.arc(cx, cy, hubR, 0, 2 * Math.PI);
    ctx.fillStyle = domeGrad;
    ctx.fill();
    // 碳黑面罩眼窩
    ctx.beginPath();
    ctx.arc(cx, cy, hubR * 0.52, 0, 2 * Math.PI);
    ctx.fillStyle = '#1A1A1B';
    ctx.fill();
    // 氧氣藍 LED 核心（發光）
    ctx.save();
    ctx.shadowColor = '#00E5FF';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.arc(cx, cy, hubR * 0.3, 0, 2 * Math.PI);
    ctx.fillStyle = '#00E5FF';
    ctx.fill();
    ctx.restore();
    ctx.beginPath();
    ctx.arc(cx, cy, hubR * 0.14, 0, 2 * Math.PI);
    ctx.fillStyle = '#EAFFFF';
    ctx.fill();
  }

  // ---- 轉動與中獎（§5.4 照抄）----
  function spin() {
    if (state.spinning || state.items.length < 2) return;
    state.spinning = true;
    spinBtn.disabled = true;
    ensureAudio();                                     // 使用者手勢內解鎖音訊

    var n = state.items.length;
    var seg = 360 / n;
    var winnerIndex = Math.floor(Math.random() * n);
    var centerOffset = winnerIndex * seg + seg / 2;
    var jitter = (Math.random() - 0.5) * seg * 0.7;
    var current = state.rotation;
    var delta = ((360 - centerOffset) - (current % 360) + 720) % 360;
    var target = current + 5 * 360 + delta + jitter;

    animate(current, target, 4000, seg, function () {
      state.rotation = target;
      state.spinning = false;
      spinBtn.disabled = false;
      playChime();                                     // 落定金屬鐘鳴
      showResult(state.items[winnerIndex], winnerIndex);
      if (pendingResize) { pendingResize = false; drawWheel(); }
    });
  }
  function animate(from, to, dur, tickSeg, done) {
    var t0 = performance.now();
    var lastBoundary = 0;                              // 已通過的扇形邊界數
    (function frame(now) {
      var t = Math.min((now - t0) / dur, 1);
      var p = 1 - Math.pow(1 - t, 3);
      var angle = from + (to - from) * p;
      canvas.style.transform = 'rotate(' + angle + 'deg)';
      // 每過一格扇形邊界播金屬 tick（每幀至多一次 → 減速時自然變稀）
      var b = Math.floor((angle - from) / tickSeg);
      if (b > lastBoundary) { lastBoundary = b; playTick(); }
      if (t < 1) requestAnimationFrame(frame); else done();
    })(performance.now());
  }

  // ---- 結果 modal（§5.5）----
  function showResult(item, winnerIndex) {
    resultName.textContent = item;
    resultName.dataset.idx = winnerIndex;
    mapsBtn.textContent = '🗺️ 找最近的' + item;
    resultModal.classList.add('show');
  }
  function closeModal() { resultModal.classList.remove('show'); }

  mapsBtn.addEventListener('click', function () {
    var item = resultName.textContent;
    window.open(
      'https://www.google.com/maps/search/?api=1&query=' +
        encodeURIComponent('附近的' + item),
      '_blank', 'noopener');
  });
  againBtn.addEventListener('click', function () { closeModal(); spin(); });
  resultModal.addEventListener('click', function (e) {
    if (e.target === resultModal) closeModal();
  });

  // ---- 選項管理（§5.6）----
  var msgTimer;
  function showMsg(t) {
    msg.textContent = t;
    clearTimeout(msgTimer);
    msgTimer = setTimeout(function () { msg.textContent = ''; }, 3000);
  }
  function commit() {
    saveItems();
    drawWheel();
    renderList();
  }
  function renderList() {
    itemList.textContent = '';
    var canDelete = state.items.length > 2;
    state.items.forEach(function (name, i) {
      var row = document.createElement('div');
      row.className = 'item-row';
      var label = document.createElement('span');
      label.className = 'item-name';
      label.textContent = name;
      var del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.setAttribute('aria-label', '刪除 ' + name);
      del.disabled = !canDelete;
      del.addEventListener('click', function () { removeItem(i); });
      row.appendChild(label);
      row.appendChild(del);
      itemList.appendChild(row);
    });
    editSummary.textContent = '⚙️ 編輯選項（' + state.items.length + ' 個）';
  }
  function addItem() {
    if (state.spinning) return;
    var raw = newItemInput.value.trim();
    if (!raw) { showMsg('請輸入名稱'); return; }
    if (state.items.indexOf(raw) !== -1) { showMsg('「' + raw + '」已存在'); return; }
    if (Array.from(raw).length > 12) { showMsg('名稱最長 12 字'); return; }
    if (state.items.length >= MAX) { showMsg('最多 ' + MAX + ' 個選項'); return; }
    state.items.push(raw);
    newItemInput.value = '';
    commit();
  }
  function removeItem(i) {
    if (state.spinning) return;
    if (state.items.length <= 2) return;
    state.items.splice(i, 1);
    commit();
  }
  function resetItems() {
    if (state.spinning) return;
    state.items = DEFAULTS.slice();
    commit();
  }

  spinBtn.addEventListener('click', spin);
  addBtn.addEventListener('click', addItem);
  resetBtn.addEventListener('click', resetItems);
  newItemInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); addItem(); }
  });
  soundBtn.addEventListener('click', function () {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    soundBtn.setAttribute('aria-label', soundOn ? '音效開啟' : '音效關閉');
    try { localStorage.setItem(SKEY, soundOn ? '1' : '0'); } catch (e) {}
    if (soundOn) { ensureAudio(); playTick(); }         // 開啟即回饋一聲
  });

  // ---- resize（§6.5）----
  var resizeTimer, pendingResize = false;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      if (state.spinning) { pendingResize = true; return; }
      drawWheel();
    }, 200);
  });

  // ---- init ----
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  drawWheel();
  renderList();
</script>
</body>
</html>
